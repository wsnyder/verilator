---
# DESCRIPTION: Github actions config
# This name is key to badges in README.rst, so we use the name build
# SPDX-License-Identifier: LGPL-3.0-only OR Artistic-2.0

name: build-test

on:
  push:
    branches-ignore:
      - 'dependabot/**'  # Avoid duplicates: only run the PR, not the push
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # weekly

permissions:
  contents: read

defaults:
  run:
    working-directory: repo

concurrency:
  # At most 1 job per branch. Auto cancel on pull requests and on all forks
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.repository != 'verilator/verilator' }}

jobs:

  build-2404-gcc:
    name: Build | ${{ matrix.os }} | ${{ matrix.cc }}${{ matrix.asan && ' | asan' || '' }}
    uses: ./.github/workflows/reusable-build.yml
    with:
      sha: ${{ github.sha }}
      os: ${{ matrix.os }}
      os-name: linux
      cc: ${{ matrix.cc }}
      dev-asan: ${{ matrix.asan }}
      dev-gcov: 0
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-24.04-riscv, cc: gcc, asan: 0}

  build-2404-clang:
    name: Build | ${{ matrix.os }} | ${{ matrix.cc }}${{ matrix.asan && ' | asan' || '' }}
    uses: ./.github/workflows/reusable-build.yml
    with:
      sha: ${{ github.sha }}
      os: ${{ matrix.os }}
      os-name: linux
      cc: ${{ matrix.cc }}
      dev-asan: ${{ matrix.asan }}
      dev-gcov: 0
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-24.04-riscv, cc: clang, asan: 1}

  test-2404-gcc:
    name: Test | ${{ matrix.os }} | ${{ matrix.cc }} | ${{ matrix.reloc && 'reloc | ' || '' }} ${{ matrix.suite }}
    needs: build-2404-gcc
    uses: ./.github/workflows/reusable-test.yml
    with:
      archive: ${{ needs.build-2404-gcc.outputs.archive }}
      os: ${{ matrix.os }}
      cc: ${{ matrix.cc }}
      reloc: ${{ matrix.reloc }}
      suite: ${{ matrix.suite }}
      dev-gcov: 0
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 24.04-riscv gcc
          - {os: ubuntu-24.04-riscv, cc: gcc, reloc: 0, suite: dist-vlt-0}
          - {os: ubuntu-24.04-riscv, cc: gcc, reloc: 0, suite: dist-vlt-1}
          - {os: ubuntu-24.04-riscv, cc: gcc, reloc: 0, suite: dist-vlt-2}
          - {os: ubuntu-24.04-riscv, cc: gcc, reloc: 0, suite: dist-vlt-3}
          - {os: ubuntu-24.04-riscv, cc: gcc, reloc: 0, suite: vltmt-0}
          - {os: ubuntu-24.04-riscv, cc: gcc, reloc: 0, suite: vltmt-1}
          - {os: ubuntu-24.04-riscv, cc: gcc, reloc: 0, suite: vltmt-2}

  test-2404-clang:
    name: Test | ${{ matrix.os }} | ${{ matrix.cc }} | ${{ matrix.reloc && 'reloc | ' || '' }} ${{ matrix.suite }}
    needs: build-2404-clang
    uses: ./.github/workflows/reusable-test.yml
    with:
      archive: ${{ needs.build-2404-clang.outputs.archive }}
      os: ${{ matrix.os }}
      cc: ${{ matrix.cc }}
      reloc: ${{ matrix.reloc }}
      suite: ${{ matrix.suite }}
      dev-gcov: 0
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 24.04-riscv clang
          - {os: ubuntu-24.04-riscv, cc: clang, reloc: 0, suite: dist-vlt-0}
          - {os: ubuntu-24.04-riscv, cc: clang, reloc: 0, suite: dist-vlt-1}
          - {os: ubuntu-24.04-riscv, cc: clang, reloc: 0, suite: dist-vlt-2}
          - {os: ubuntu-24.04-riscv, cc: clang, reloc: 0, suite: dist-vlt-3}
          - {os: ubuntu-24.04-riscv, cc: clang, reloc: 0, suite: vltmt-0}
          - {os: ubuntu-24.04-riscv, cc: clang, reloc: 0, suite: vltmt-1}
          - {os: ubuntu-24.04-riscv, cc: clang, reloc: 0, suite: vltmt-2}
